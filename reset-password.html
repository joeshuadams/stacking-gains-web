<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset Password — Stacking Gains</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #1a1a1a;
        color: #ffffff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        text-align: center;
        max-width: 360px;
      }
      h1 {
        color: #ffcc00;
        font-size: 22px;
        margin: 0 0 8px;
      }
      p {
        color: #b3b3b3;
        font-size: 15px;
        line-height: 1.5;
        margin: 0 0 20px;
      }
      a.button {
        display: inline-block;
        padding: 12px 24px;
        background: #006940;
        color: #ffffff;
        text-decoration: none;
        border-radius: 10px;
        font-weight: 600;
      }
      .error {
        color: #ff6b1a;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Opening Stacking Gains…</h1>
      <p id="message">If the app doesn't open automatically, tap the button below.</p>
      <a id="fallback" class="button" href="#">Open Stacking Gains</a>
    </div>

    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var token = params.get("token");
        var message = document.getElementById("message");
        var fallback = document.getElementById("fallback");

        if (!token) {
          message.className = "error";
          message.textContent =
            "This reset link is missing a token. Please request a new reset email from the app.";
          fallback.style.display = "none";
          return;
        }

        var deepLink = "stacking-gains://reset-password?token=" + encodeURIComponent(token);
        fallback.href = deepLink;

        // Fire the redirect immediately.
        window.location.replace(deepLink);
      })();
    </script>
  </body>
</html>
